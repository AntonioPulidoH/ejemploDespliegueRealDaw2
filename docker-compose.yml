services:
  db:
    image: postgres:16
    container_name: hm_postgres
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build:
      context: ./backend
    container_name: hm_backend
    environment:
      DATABASE_URL: postgres://appuser:apppass@db:5432/appdb
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - db
  frontend:
    build:
      context: ./frontend
    container_name: hm_frontend
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
